name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test:
    name: Tests & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc

      - name: Lint
        continue-on-error: true
        run: pnpm biome check .

      - name: Run tests
        run: pnpm test:run

      - name: Detect changed tracker files
        if: github.event_name == 'pull_request'
        id: changed-trackers
        run: |
          FILES=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/files" --paginate --jq '.[].filename' | grep '^src/data/trackers/.*\.ts$' | grep -v 'index\.ts$' || true)
          if [ -z "$FILES" ]; then
            echo "has_tracker_changes=false" >> "$GITHUB_OUTPUT"
            echo "No tracker files changed."
          else
            SLUGS=""
            for f in $FILES; do
              SLUG=$(basename "$f" .ts)
              SLUGS="$SLUGS $SLUG"
            done
            SLUGS=$(echo "$SLUGS" | xargs)
            echo "has_tracker_changes=true" >> "$GITHUB_OUTPUT"
            echo "slugs=$SLUGS" >> "$GITHUB_OUTPUT"
            echo "Changed trackers: $SLUGS"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Validate changed trackers
        if: github.event_name == 'pull_request' && steps.changed-trackers.outputs.has_tracker_changes == 'true'
        id: tracker-validation
        continue-on-error: true
        run: |
          npx tsx scripts/validate-trackers.ts $SLUGS > /tmp/tracker-results.json 2>/dev/null
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat /tmp/tracker-results.json
        env:
          SLUGS: ${{ steps.changed-trackers.outputs.slugs }}

      - name: Comment on PR with tracker validation results
        if: github.event_name == 'pull_request' && steps.changed-trackers.outputs.has_tracker_changes == 'true'
        uses: actions/github-script@v7
        env:
          VALIDATION_JSON: ${{ steps.changed-trackers.outputs.slugs }}
        with:
          script: |
            const fs = require('fs');
            let results;
            try {
              const raw = fs.readFileSync('/tmp/tracker-results.json', 'utf8');
              results = JSON.parse(raw).results;
            } catch {
              console.log('No validation results to comment on.');
              return;
            }

            // Only comment on non-draft trackers
            const nonDraft = results.filter(r => !r.draft);

            const hasErrors = nonDraft.some(r => r.errors.length > 0);
            const hasWarnings = nonDraft.some(r => r.warnings.length > 0);

            // Helper: find and delete previous validation comment
            const marker = 'Tracker registry validation';
            async function deletePreviousComment() {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const existing = comments.find(c =>
                c.user?.login === 'github-actions[bot]' &&
                c.body?.includes(marker)
              );
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
            }

            // Clean up and exit if nothing to report
            if (nonDraft.length === 0 || (!hasErrors && !hasWarnings)) {
              await deletePreviousComment();
              return;
            }

            const icon = hasErrors ? '🚫' : '⚠️';
            const title = hasErrors
              ? `${icon} Tracker registry validation failed`
              : `${icon} Tracker registry warnings`;

            const lines = [`**${title}**`, ''];

            for (const r of nonDraft) {
              if (r.errors.length === 0 && r.warnings.length === 0) continue;

              // Errors are always visible
              if (r.errors.length > 0) {
                lines.push(`### ${r.name} (\`${r.slug}\`)`);
                lines.push('');
                lines.push('| Field | Status |');
                lines.push('|---|---|');
                for (const e of r.errors) {
                  lines.push(`| ${e} | ❌ Error |`);
                }
                lines.push('');
              }

              // Warnings are collapsed
              if (r.warnings.length > 0) {
                const heading = r.errors.length > 0
                  ? `Warnings for ${r.name}`
                  : `${r.name} (\`${r.slug}\`) — Warnings`;
                lines.push(`<details>`);
                lines.push(`<summary>${heading} (${r.warnings.length})</summary>`);
                lines.push('');
                lines.push('| Field | Status |');
                lines.push('|---|---|');
                for (const w of r.warnings) {
                  lines.push(`| ${w} | ⚠️ Warning |`);
                }
                lines.push('');
                lines.push('</details>');
                lines.push('');
              }
            }

            lines.push('---');
            lines.push('');
            lines.push('Allowed content categories: `Movies`, `TV`, `Music`, `Games`, `Apps`, `Sports`, `Books`, `Audiobooks`, `Comics`, `Manga`, `Anime`, `XXX`, `Documentaries`, `Education`, `Tutorials`, `Fanres`');
            lines.push('');
            lines.push('See `src/data/__tests__/tracker-registry.test.ts` for all validation rules.');

            const body = lines.join('\n');

            await deletePreviousComment();
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Verify security test count
        run: |
          COUNT=$(pnpm test:run -- src/lib/__tests__/security.test.ts 2>&1 \
            | sed 's/\x1b\[[0-9;]*m//g' \
            | grep 'security\.test\.ts' \
            | grep -oE '[0-9]+ test' \
            | grep -oE '[0-9]+')
          echo "Security tests: $COUNT"
          if [ "$COUNT" -lt 78 ]; then
            echo "::error::Security test count dropped below expected minimum (78). Was a test removed?"
            exit 1
          fi

      # ── Security audit ──────────────────────────────────────────────
      - name: Run security audit
        id: security-audit
        continue-on-error: true
        run: |
          npx tsx scripts/security-audit.ts > /tmp/security-results.json 2>/dev/null
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat /tmp/security-results.json

      - name: Comment on PR with security audit results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let data;
            try {
              const raw = fs.readFileSync('/tmp/security-results.json', 'utf8');
              data = JSON.parse(raw);
            } catch {
              console.log('No security audit results to comment on.');
              return;
            }

            const { results, summary } = data;
            const hasCritical = summary.critical > 0;
            const hasWarning = summary.warning > 0;

            const icon = hasCritical ? '🚫' : hasWarning ? '⚠️' : '✅';
            const title = hasCritical
              ? `${icon} Security audit failed`
              : hasWarning
                ? `${icon} Security audit passed with warnings`
                : `${icon} Security audit passed`;

            const lines = [`**${title}**`, ''];

            // Critical failures table
            const criticalFails = results.filter(r => r.severity === 'critical' && r.status === 'fail');
            if (criticalFails.length > 0) {
              lines.push('### Critical Failures');
              lines.push('');
              lines.push('| Check | File | Details |');
              lines.push('|---|---|---|');
              for (const r of criticalFails) {
                for (const f of r.findings) {
                  const loc = f.line ? `${f.file}:${f.line}` : f.file;
                  lines.push(`| ${r.name} | \`${loc}\` | ${f.detail} |`);
                }
              }
              lines.push('');
            }

            // Warning table
            const warningFails = results.filter(r => r.severity === 'warning' && r.status === 'fail');
            if (warningFails.length > 0) {
              lines.push('### Warnings');
              lines.push('');
              lines.push('| Check | File | Details |');
              lines.push('|---|---|---|');
              for (const r of warningFails) {
                for (const f of r.findings) {
                  const loc = f.line ? `${f.file}:${f.line}` : f.file;
                  lines.push(`| ${r.name} | \`${loc}\` | ${f.detail} |`);
                }
              }
              lines.push('');
            }

            // Passed checks summary
            const passed = results.filter(r => r.status === 'pass');
            if (passed.length > 0) {
              lines.push(`### Passed (${passed.length}/${results.length})`);
              lines.push('');
              for (const r of passed) {
                lines.push(`- ✅ ${r.name}`);
              }
              lines.push('');
            }

            lines.push('---');
            lines.push(`**Summary:** ${summary.passed}/${summary.total} checks passed`);
            if (summary.critical > 0) lines.push(` — **${summary.critical} critical failure(s)**`);
            if (summary.warning > 0) lines.push(` — ${summary.warning} warning(s)`);
            lines.push('');
            lines.push('See `scripts/security-audit.ts` for check definitions and `SECURITY.md` for the full security architecture.');

            const body = lines.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = 'Security audit';
            const existing = comments.find(c =>
              c.user?.login === 'github-actions[bot]' &&
              c.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # ── Security audit file tamper check ───────────────────────────
      - name: Alert if security audit script was modified
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
        with:
          script: |
            const { data: prFiles } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const files = prFiles.map(f => f.filename);

            const auditFiles = files.filter(f =>
              f === 'scripts/security-audit.ts' ||
              f === 'src/lib/__tests__/security.test.ts'
            );

            if (auditFiles.length === 0) return;

            const marker = 'Security audit file modification';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user?.login === 'github-actions[bot]' &&
              c.body?.includes(marker)
            );

            const body = [
              `**\u{1F6A8} ${marker} detected**`,
              '',
              'The following security-critical files were changed in this PR:',
              '',
              ...auditFiles.map(f => `- \`${f}\``),
              '',
              'These files guard the security posture of the project. Please review these changes carefully to ensure no checks were weakened or removed.',
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # ── Fail steps (after all comments are posted) ─────────────────
      - name: Fail if tracker validation has errors
        if: github.event_name == 'pull_request' && steps.changed-trackers.outputs.has_tracker_changes == 'true' && steps.tracker-validation.outcome == 'failure'
        run: exit 1

      - name: Fail if security audit has critical findings
        if: steps.security-audit.outcome == 'failure'
        run: exit 1

  docker:
    name: Docker Build & Scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: tracker-tracker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          set -euo pipefail

          # Create an isolated network for the smoke test
          docker network create smoke-net

          # Start a Postgres container the app can talk to
          docker run -d --name smoke-db --network smoke-net \
            -e POSTGRES_USER=test \
            -e POSTGRES_PASSWORD=test \
            -e POSTGRES_DB=test \
            postgres:16

          # Give Postgres a moment to initialize
          sleep 10

          # Start the application container connected to the same network
          docker run -d --name smoke --network smoke-net -p 3000:3000 \
            -e DATABASE_URL="postgresql://test:test@smoke-db:5432/test" \
            -e NODE_ENV=production \
            -e SESSION_SECRET="ci-smoke-test-secret-that-is-at-least-32-characters-long" \
            tracker-tracker:ci

          # Wait briefly for the app to start up
          sleep 5

          STATUS=$(docker inspect -f '{{.State.Status}}' smoke 2>/dev/null || echo "missing")
          if [ "$STATUS" != "running" ]; then
            echo "::error::Container exited unexpectedly"
            docker logs smoke || true
            # Cleanup on failure
            docker stop smoke-db >/dev/null 2>&1 || true
            docker rm smoke-db >/dev/null 2>&1 || true
            docker network rm smoke-net >/dev/null 2>&1 || true
            exit 1
          fi

          echo "Smoke test passed — container is running."

          # Cleanup containers and network
          docker stop smoke smoke-db
          docker rm smoke smoke-db
          docker network rm smoke-net

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: tracker-tracker:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
