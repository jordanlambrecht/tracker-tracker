<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 825 250">
  <defs>
    <filter id="nm-inset" x="0%" y="0%" width="100%" height="100%">
      <!-- Invert alpha to create the "walls" of the pressed shape -->
      <feComponentTransfer in="SourceAlpha" result="invert">
        <feFuncA type="table" tableValues="1 0"/>
      </feComponentTransfer>

      <!-- Dark inset (top-left inner edge in shadow) -->
      <feGaussianBlur in="invert" stdDeviation="2" result="blurDark"/>
      <feOffset dx="2" dy="2" in="blurDark" result="offsetDark"/>
      <feFlood flood-color="#0e0f14" flood-opacity="0.8" result="darkColor"/>
      <feComposite in="darkColor" in2="offsetDark" operator="in" result="darkShadow"/>
      <feComposite in="darkShadow" in2="SourceAlpha" operator="in" result="darkInset"/>

      <!-- Light inset (bottom-right inner edge catches light) -->
      <feGaussianBlur in="invert" stdDeviation="2" result="blurLight"/>
      <feOffset dx="-2" dy="-2" in="blurLight" result="offsetLight"/>
      <feFlood flood-color="#4a4e68" flood-opacity="0.5" result="lightColor"/>
      <feComposite in="lightColor" in2="offsetLight" operator="in" result="lightShadow"/>
      <feComposite in="lightShadow" in2="SourceAlpha" operator="in" result="lightInset"/>

      <!-- Source fill, then inset shadows layered on top -->
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="darkInset"/>
        <feMergeNode in="lightInset"/>
      </feMerge>
    </filter>
  </defs>

